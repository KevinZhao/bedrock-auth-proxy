worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr ${LOG_LEVEL};

events {
    worker_connections 4096;
    use epoll;
}

http {
    # Run as non-root — move all runtime paths under /tmp.
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    # Basics
    server_tokens off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Upload limits — Claude Code requests can be large (full conversation context).
    client_max_body_size 64m;
    client_body_buffer_size 1m;

    # Timeouts — long streaming is the norm, not the exception.
    client_header_timeout 60s;
    client_body_timeout 60s;
    keepalive_timeout 75s;
    keepalive_requests 1000;

    # DNS resolver for runtime upstream resolution inside Kubernetes.
    # kube-dns / CoreDNS lives at 10.96.0.10 by default but we trust /etc/resolv.conf.
    resolver ${DNS_RESOLVER} ipv6=off valid=30s;
    resolver_timeout 5s;

    # Structured JSON access log — stdout so Kubernetes picks it up.
    # $safe_session_id is defined by a `map` in conf.d/gateway.conf.
    # nginx resolves map variables lazily, so referring to it here is legal as
    # long as that file is loaded by the `include conf.d/*.conf` below. If the
    # map is ever removed, nginx falls back to an empty string silently — the
    # log field will quietly blank, not crash. Keep them co-located.
    log_format cc_json escape=json
        '{'
          '"time":"$time_iso8601",'
          '"remote":"$remote_addr",'
          '"session":"$safe_session_id",'
          '"method":"$request_method",'
          '"uri":"$request_uri",'
          '"upstream_addr":"$upstream_addr",'
          '"upstream_status":"$upstream_status",'
          '"status":$status,'
          '"req_ms":$request_time,'
          '"upstream_ms":"$upstream_response_time",'
          '"bytes_sent":$bytes_sent,'
          '"user_agent":"$http_user_agent"'
        '}';
    access_log /dev/stdout cc_json;

    include /etc/nginx/conf.d/*.conf;
}
