worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr ${LOG_LEVEL};

events {
    worker_connections 4096;
    use epoll;
}

http {
    # Run as non-root — move all runtime paths under /tmp.
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    # Basics
    server_tokens off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Upload limits — Claude Code requests can be large (full conversation context).
    client_max_body_size 64m;
    client_body_buffer_size 1m;

    # Timeouts — long streaming is the norm, not the exception.
    client_header_timeout 60s;
    client_body_timeout 60s;
    keepalive_timeout 75s;
    keepalive_requests 1000;

    # DNS resolver for runtime upstream resolution inside Kubernetes.
    # kube-dns / CoreDNS lives at 10.96.0.10 by default but we trust /etc/resolv.conf.
    resolver ${DNS_RESOLVER} ipv6=off valid=30s;
    resolver_timeout 5s;

    # Structured JSON access log — stdout so Kubernetes picks it up.
    # $safe_session_id, $is_stream, $auth_present are defined by `map`s in
    # conf.d/gateway.conf. nginx resolves map variables lazily, so referring
    # to them here is legal as long as that file is loaded by the
    # `include conf.d/*.conf` below. If a map is ever removed, nginx falls back
    # to an empty string silently — the log field will quietly blank, not crash.
    # Keep them co-located.
    #
    # Field reference (nginx upstream timing semantics):
    #   upstream_connect_ms   TCP+TLS handshake to upstream
    #   upstream_header_ms    time until upstream sent response headers
    #                         (≈ first-byte latency for SSE/EventStream)
    #   upstream_ms           time until upstream finished sending body
    #                         (for streaming = stream close time; if equals
    #                         a fixed value like ~25s on every truncated
    #                         request, that fixed value is the upstream's
    #                         idle timeout)
    #   upstream_bytes_received  bytes nginx read from upstream — for
    #                            truncated SSE/EventStream responses, this
    #                            is the actual payload nginx received before
    #                            the upstream RST/FIN.
    #   request_completion    "OK" = full body sent to client; "" = aborted
    #                         (client dropped or upstream RST mid-stream).
    #   connection / connection_requests  identifies the TCP keep-alive
    #                         connection and which request on it this is —
    #                         useful when correlating with upstream RST.
    #   request_id            16-byte hex generated by nginx; pass through
    #                         to upstream for cross-system trace.
    log_format cc_json escape=json
        '{'
          '"time":"$time_iso8601",'
          '"remote":"$remote_addr",'
          '"session":"$safe_session_id",'
          '"request_id":"$request_id",'
          '"method":"$request_method",'
          '"uri":"$request_uri",'
          '"is_stream":"$is_stream",'
          '"auth_present":"$auth_present",'
          '"scheme":"$scheme",'
          '"host":"$host",'
          '"upstream_addr":"$upstream_addr",'
          '"upstream_status":"$upstream_status",'
          '"status":$status,'
          '"req_ms":$request_time,'
          '"upstream_connect_ms":"$upstream_connect_time",'
          '"upstream_header_ms":"$upstream_header_time",'
          '"upstream_ms":"$upstream_response_time",'
          '"upstream_bytes_received":"$upstream_bytes_received",'
          '"upstream_bytes_sent":"$upstream_bytes_sent",'
          '"bytes_sent":$bytes_sent,'
          '"request_length":$request_length,'
          '"request_completion":"$request_completion",'
          '"pipe":"$pipe",'
          '"connection":"$connection",'
          '"connection_requests":"$connection_requests",'
          '"user_agent":"$http_user_agent"'
        '}';
    access_log /dev/stdout cc_json;

    include /etc/nginx/conf.d/*.conf;
}
